services:
    postgres:
        build:
            context: .
            dockerfile: Dockerfile.postgres
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: aspen-os
            POSTGRES_PASSWORD: aspen-os
            POSTGRES_DB: aspen-os
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U aspen-os"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        volumes:
            - redisdata:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
    redisdata:
